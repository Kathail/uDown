<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>uDown</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex items-center justify-center p-4">
    <main class="w-full max-w-md space-y-6">
        <header class="text-center">
            <h1 class="text-3xl font-semibold tracking-tight">uDown</h1>
            <p class="text-zinc-400 text-sm mt-1">YouTube → MP3</p>
        </header>

        <!-- Logged-out: password -->
        <section id="login-section" class="hidden">
            <form id="login-form" method="post" action="/login" class="space-y-3">
                <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    required
                    class="w-full rounded-md bg-zinc-900 border border-zinc-800 px-4 py-2 text-zinc-100 focus:border-zinc-500 focus:outline-none"
                >
                <button type="submit" class="w-full rounded-md bg-zinc-100 text-zinc-900 font-medium py-2 hover:bg-white">Sign in</button>
                <p id="login-error" class="text-red-400 text-sm hidden"></p>
            </form>
        </section>

        <!-- Logged-in: URL -->
        <section id="download-section" class="hidden">
            <form id="download-form" class="space-y-3">
                <input
                    id="url-input"
                    type="url"
                    name="url"
                    placeholder="https://youtube.com/..."
                    required
                    class="w-full rounded-md bg-zinc-900 border border-zinc-800 px-4 py-2 text-zinc-100 focus:border-zinc-500 focus:outline-none"
                >
                <button type="submit" id="download-btn" class="w-full rounded-md bg-zinc-100 text-zinc-900 font-medium py-2 hover:bg-white">Download MP3</button>
                <p id="status" class="text-zinc-400 text-sm hidden"></p>
                <p id="error" class="text-red-400 text-sm hidden"></p>
            </form>
            <form id="logout-form" method="post" action="/logout" class="mt-6 text-center">
                <button type="submit" class="text-zinc-500 hover:text-zinc-300 text-sm">Sign out</button>
            </form>
        </section>

        <!-- Hidden form to drive the streaming download -->
        <form id="hidden-download" method="post" action="/download" class="hidden">
            <input type="hidden" name="url" id="hidden-url">
        </form>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
