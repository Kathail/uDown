<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>uDown — extract audio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="grain" aria-hidden="true"></div>
    <div class="rules" aria-hidden="true"></div>

    <header class="masthead">
        <a class="brand" href="/">
            <span class="brand__arrow" aria-hidden="true">↓</span><span class="brand__word">DOWN</span>
        </a>
        <div class="masthead__meta">
            <span class="meta-line" id="meta-clock">— : — : —</span>
            <span class="meta-line meta-divider" aria-hidden="true">·</span>
            <span class="meta-line">320 KBPS · MP3</span>
        </div>
    </header>

    <main class="stage">
        <!-- Logged-out: password -->
        <section id="login-section" class="hidden panel">
            <div class="step">
                <span class="step__numeral">01</span>
                <span class="step__label">access</span>
            </div>
            <hr class="rule">
            <h1 class="lede">
                authentication
                <em>required.</em>
            </h1>
            <hr class="rule">

            <form id="login-form" method="post" action="/login" class="form">
                <label class="field">
                    <span class="field__label">passphrase</span>
                    <input type="password" name="password" placeholder="•••••••" required autofocus>
                </label>
                <button type="submit" class="btn btn--accent">
                    <span class="btn__caret" aria-hidden="true">▶</span>
                    <span class="btn__label">unlock</span>
                </button>
                <p id="login-error" class="msg msg--error hidden" role="alert"></p>
            </form>
        </section>

        <!-- Logged-in: URL -->
        <section id="download-section" class="hidden panel">
            <div class="step">
                <span class="step__numeral">02</span>
                <span class="step__label">extract</span>
            </div>
            <hr class="rule">
            <h1 class="lede">
                a small machine
                for lifting <em>audio</em>
                off moving pictures.
            </h1>
            <hr class="rule">

            <form id="download-form" class="form">
                <label class="field">
                    <span class="field__label">source</span>
                    <input id="url-input" type="url" name="url" placeholder="https://youtube.com/…" required>
                </label>
                <button type="submit" id="download-btn" class="btn btn--accent btn--big">
                    <span class="btn__caret" aria-hidden="true">▶</span>
                    <span class="btn__label">extract mp3 · 320kbps</span>
                </button>
                <p id="status" class="msg msg--status hidden" role="status"></p>
                <p id="error" class="msg msg--error hidden" role="alert"></p>
            </form>

            <hr class="rule rule--thin">
            <form id="logout-form" method="post" action="/logout" class="logout">
                <button type="submit">— sign out</button>
            </form>
        </section>

        <!-- Hidden form to drive the streaming download -->
        <form id="hidden-download" method="post" action="/download" class="hidden" aria-hidden="true">
            <input type="hidden" name="url" id="hidden-url">
        </form>
    </main>

    <footer class="footer">
        <span>uDown</span>
        <span class="dot" aria-hidden="true">·</span>
        <span>self-hosted</span>
        <span class="dot" aria-hidden="true">·</span>
        <span>personal scale</span>
    </footer>

    <script src="/static/app.js"></script>
</body>
</html>
